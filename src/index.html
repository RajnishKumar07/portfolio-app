<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>PortfolioApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="overflow-x-hidden antialiased selection:bg-teal-400/30 selection:text-teal-200">
  <app-root>
    <div style="height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #0f172a; flex-direction: column;">
      <style>
        .initial-loader {
          width: 48px;
          height: 48px;
          border: 5px solid #1e293b;
          border-bottom-color: #4ade80;
          border-radius: 50%;
          display: inline-block;
          box-sizing: border-box;
          animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <span class="initial-loader"></span>
      <p style="color: #94a3b8; font-family: Inter, sans-serif; margin-top: 1rem; font-size: 0.875rem;">Initializing Application...</p>
    </div>
  </app-root>
</body>
</html>
