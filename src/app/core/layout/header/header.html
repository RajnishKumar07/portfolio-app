<header 
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300 pointer-events-auto"
  [ngClass]="{
    'bg-neutral-900/80 backdrop-blur-md shadow-lg py-4': scrolled(),
    'bg-transparent py-6': !scrolled()
  }"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between gap-4">
    <a href="#" class="text-xl sm:text-2xl font-extrabold tracking-tighter cursor-pointer truncate max-w-[180px] sm:max-w-xs md:max-w-sm">
      {{ firstName() }} <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-teal-400">{{ lastName() }}</span>
    </a>
    
    <nav class="hidden md:flex gap-8">
      <a (click)="scrollTo('about')" class="cursor-pointer text-sm font-medium transition-colors uppercase tracking-widest"
         [ngClass]="activeSection() === 'about' ? 'text-white' : 'text-neutral-400 hover:text-white'">About</a>
      <a (click)="scrollTo('experience')" class="cursor-pointer text-sm font-medium transition-colors uppercase tracking-widest"
         [ngClass]="activeSection() === 'experience' ? 'text-white' : 'text-neutral-400 hover:text-white'">Experience</a>
      <a (click)="scrollTo('skills')" class="cursor-pointer text-sm font-medium transition-colors uppercase tracking-widest"
         [ngClass]="activeSection() === 'skills' ? 'text-white' : 'text-neutral-400 hover:text-white'">Skills</a>
      <a (click)="scrollTo('projects')" class="cursor-pointer text-sm font-medium transition-colors uppercase tracking-widest"
         [ngClass]="activeSection() === 'projects' ? 'text-white' : 'text-neutral-400 hover:text-white'">Projects</a>
      <a (click)="scrollTo('education')" class="cursor-pointer text-sm font-medium transition-colors uppercase tracking-widest"
         [ngClass]="activeSection() === 'education' ? 'text-white' : 'text-neutral-400 hover:text-white'">Education</a>
    </nav>
    
    <button (click)="contactClick.emit()" class="px-5 py-2 sm:px-6 sm:py-2.5 bg-teal-500 hover:bg-teal-400 text-white shadow-[0_0_15px_rgba(45,212,191,0.3)] hover:shadow-[0_0_25px_rgba(45,212,191,0.6)] rounded-full font-bold tracking-wider transition-all duration-300 text-xs sm:text-sm whitespace-nowrap hover:-translate-y-0.5 uppercase">
      Let's Talk
    </button>
  </div>
</header>
