<section id="skills" class="py-24 px-6 relative">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center gap-4 mb-24">
      <h2 class="text-3xl md:text-5xl font-bold tracking-tight">Technical Skills</h2>
      <div class="h-px bg-gradient-to-r from-purple-500/50 to-transparent flex-1 w-12 md:w-auto"></div>
    </div>

    <div class="space-y-16">
      @for (category of data().skills; track category.category; let idx = $index) {
        <div appScrollReveal class="group/card opacity-0 translate-y-12 [&.is-revealed]:opacity-100 [&.is-revealed]:translate-y-0 transition-all duration-1000 hover:duration-500 bg-white/5 border border-white/10 rounded-3xl p-8 md:p-10 backdrop-blur-sm relative overflow-hidden group"
             [style.transition-delay]="(idx * 200 + 200) + 'ms'"
             [ngClass]="'hover:border-' + (category.colorClass || 'purple') + '-500/30'">
          <div class="absolute top-0 right-0 w-32 h-32 rounded-full blur-3xl -mr-10 -mt-10 transition-all"
               [ngClass]="'bg-' + (category.colorClass || 'purple') + '-500/10 group-hover:bg-' + (category.colorClass || 'purple') + '-500/20'"></div>
          <h3 class="flex items-center text-xl font-bold text-white mb-6">
            <span class="w-8 h-8 rounded-lg flex items-center justify-center mr-3"
                  [ngClass]="'bg-' + (category.colorClass || 'purple') + '-500/20 text-' + (category.colorClass || 'purple') + '-400'">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                @for (path of (category.iconUrl || 'M13 10V3L4 14h7v7l9-11h-7z').split('|'); track path) {
                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="path"></path>
                }
              </svg>
            </span>
            {{ category.category }}
          </h3>
          <div class="flex flex-wrap gap-3">
            @for (skill of category.items; track skill; let sIdx = $index) {
              <span class="px-4 py-2 bg-neutral-900/80 border border-white/5 rounded-full text-xs sm:text-sm font-medium text-neutral-300 hover:text-white transition-all cursor-default opacity-0 scale-95 group-[.is-revealed]/card:opacity-100 group-[.is-revealed]/card:scale-100 duration-700"
                    [ngClass]="'hover:border-' + category.colorClass + '-500/50'"
                    [style.transition-delay]="(sIdx * 150 + 500) + 'ms'">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
