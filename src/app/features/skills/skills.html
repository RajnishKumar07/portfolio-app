<section id="skills" class="py-24 px-6 relative">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center gap-4 mb-24">
      <h2 class="text-3xl md:text-5xl font-bold tracking-tight">Technical Skills</h2>
      <div class="h-px bg-gradient-to-r from-purple-500/50 to-transparent flex-1 w-12 md:w-auto"></div>
    </div>

    <div class="space-y-16">
      <!-- Frontend -->
      <div class="bg-white/5 border border-white/10 rounded-3xl p-10 backdrop-blur-sm relative overflow-hidden group hover:border-purple-500/30 transition-colors duration-500">
        <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl -mr-10 -mt-10 transition-all group-hover:bg-purple-500/20"></div>
        <h3 class="flex items-center text-xl font-bold text-white mb-6">
          <span class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center mr-3 text-purple-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          </span>
          Frontend & UI
        </h3>
        <div class="flex flex-wrap gap-3">
          @for (skill of data.skills.frontend; track skill) {
            <span class="px-4 py-2 bg-neutral-900/80 border border-white/5 rounded-full text-sm font-medium text-neutral-300 hover:text-white hover:border-purple-500/50 transition-colors cursor-default">{{ skill }}</span>
          }
        </div>
      </div>

      <!-- Backend -->
      <div class="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-sm relative overflow-hidden group hover:border-teal-500/30 transition-colors duration-500">
        <div class="absolute top-0 right-0 w-32 h-32 bg-teal-500/10 rounded-full blur-3xl -mr-10 -mt-10 transition-all group-hover:bg-teal-500/20"></div>
        <h3 class="flex items-center text-xl font-bold text-white mb-6">
          <span class="w-8 h-8 rounded-lg bg-teal-500/20 flex items-center justify-center mr-3 text-teal-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
          </span>
          Real-time & Backend
        </h3>
        <div class="flex flex-wrap gap-3">
          @for (skill of data.skills.backend; track skill) {
            <span class="px-4 py-2 bg-neutral-900/80 border border-white/5 rounded-full text-sm font-medium text-neutral-300 hover:text-white hover:border-teal-500/50 transition-colors cursor-default">{{ skill }}</span>
          }
        </div>
      </div>

      <!-- Tools -->
      <div class="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-sm relative overflow-hidden group hover:border-indigo-500/30 transition-colors duration-500">
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -mr-10 -mt-10 transition-all group-hover:bg-indigo-500/20"></div>
        <h3 class="flex items-center text-xl font-bold text-white mb-6">
          <span class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center mr-3 text-indigo-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </span>
          Tools & DevOps
        </h3>
        <div class="flex flex-wrap gap-3">
          @for (skill of data.skills.tools; track skill) {
            <span class="px-4 py-2 bg-neutral-900/80 border border-white/5 rounded-full text-sm font-medium text-neutral-300 hover:text-white hover:border-indigo-500/50 transition-colors cursor-default">{{ skill }}</span>
          }
        </div>
      </div>
    </div>
  </div>
</section>
