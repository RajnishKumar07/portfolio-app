<section class="min-h-screen bg-neutral-100 flex items-center justify-center p-6 relative overflow-hidden text-neutral-900">
  <!-- Minimalist Background Orbs -->
  <div class="fixed inset-0 z-0 bg-neutral-950 pointer-events-none">
     <div class="absolute top-[30%] left-[20%] w-96 h-96 bg-purple-600/20 rounded-full blur-[120px]"></div>
     <div class="absolute bottom-[20%] right-[20%] w-96 h-96 bg-teal-500/20 rounded-full blur-[120px]"></div>
  </div>

  <div class="w-full max-w-md bg-neutral-900/80 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden relative z-10 p-8 sm:p-12 text-white">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold tracking-tight mb-2">Reset Password</h2>
      <p class="text-neutral-400">Recover access to your portfolio</p>
    </div>

    @if (errorMessage()) {
      <div class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-4 rounded-xl mb-6 flex items-start gap-3">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    @if (successMessage()) {
      <div class="bg-teal-500/10 border border-teal-500/50 text-teal-400 text-sm p-4 rounded-xl mb-6 flex items-start gap-3">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>{{ successMessage() }}</span>
      </div>
    }

    <form (submit)="$event.preventDefault(); step() === 1 ? requestOtp() : onSubmit()" class="space-y-5">
      @if (step() === 1) {
        <div class="space-y-2">
          <label for="email" class="text-sm font-medium text-neutral-300 block">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="email" 
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all shadow-inner"
            placeholder="you@example.com"
            required
          >
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading()"
          class="w-full mt-2 bg-gradient-to-r from-teal-500 to-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-[0_0_20px_rgba(45,212,191,0.4)] transition-all duration-300 disabled:opacity-70 disabled:cursor-not-allowed group relative overflow-hidden"
        >
          <div class="absolute inset-0 w-full h-full bg-white/20 -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-out"></div>
          <span class="relative flex items-center justify-center gap-2">
            @if (isLoading()) {
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Sending...
            } @else {
              Send Reset Code
            }
          </span>
        </button>
      } @else {
        <div class="space-y-2">
          <label for="otp" class="text-sm font-medium text-neutral-300 block">Verification Code (OTP)</label>
          <p class="text-xs text-neutral-400 mb-2">We sent a 6-digit code to {{ email() }}</p>
          <input 
            type="text" 
            id="otp" 
            name="otp"
            [(ngModel)]="otp" 
            class="w-full tracking-[0.5em] text-center font-mono text-2xl bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all shadow-inner"
            placeholder="••••••"
            maxlength="6"
            required
          >
        </div>

        <div class="space-y-2 pt-2">
          <label for="newPassword" class="text-sm font-medium text-neutral-300 block">New Password</label>
          <input 
            type="password" 
            id="newPassword" 
            name="newPassword"
            [(ngModel)]="newPassword" 
            class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-neutral-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all shadow-inner"
            placeholder="••••••••"
            minlength="8"
            required
          >
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading() || otp().length < 6 || newPassword().length < 8"
          class="w-full mt-4 bg-gradient-to-r from-teal-500 to-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-[0_0_20px_rgba(45,212,191,0.4)] transition-all duration-300 disabled:opacity-70 disabled:cursor-not-allowed group relative overflow-hidden"
        >
          <div class="absolute inset-0 w-full h-full bg-white/20 -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-out"></div>
          <span class="relative flex items-center justify-center gap-2">
            @if (isLoading()) {
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Updating...
            } @else {
              Reset Password
            }
          </span>
        </button>
        <button type="button" (click)="step.set(1)" class="w-full text-sm text-neutral-400 hover:text-white transition-colors mt-2">
          Back to Email
        </button>
      }
    </form>

    <p class="text-neutral-400 text-sm text-center mt-8">
      Remembered your password? <a routerLink="/login" class="text-purple-400 hover:text-white transition-colors font-medium">Log back in</a>
    </p>
  </div>
</section>
