<section class="py-24 px-6 relative">
  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 md:gap-24">
    <!-- Education -->
    <div>
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-12 text-white flex items-center">
        <svg class="w-8 h-8 mr-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
        Education
      </h2>
      <div class="space-y-10">
        @for (edu of data.education; track edu.degree) {
          <div class="relative pl-8 border-l-2 border-white/10">
            <div class="absolute -left-[11px] top-1.5 w-5 h-5 rounded-full bg-neutral-900 border-2 border-purple-500"></div>
            <h3 class="text-xl font-bold text-white mb-2">{{ edu.degree }}</h3>
            <p class="text-purple-400 font-medium mb-3">{{ edu.institution }}</p>
            <p class="text-sm text-neutral-500 font-medium">{{ edu.period }}</p>
          </div>
        }
      </div>
    </div>

    <!-- Certifications -->
    <div>
      <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-12 text-white flex items-center">
        <svg class="w-8 h-8 mr-4 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
        Certifications
      </h2>
      <div class="space-y-8">
        @for (cert of data.certifications; track cert.title) {
          <a [href]="cert.url" target="_blank" class="block bg-white/5 border border-white/10 rounded-2xl p-6 hover:bg-white/10 hover:border-teal-500/50 transition-all duration-300 group">
            <h3 class="text-lg text-white font-medium mb-3 group-hover:text-teal-400 transition-colors">{{ cert.title }}</h3>
            <span class="text-sm text-neutral-400 flex items-center">
              View Credential
              <svg class="w-4 h-4 ml-2 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </span>
          </a>
        }
      </div>
    </div>
  </div>
</section>
