@if (portfolioData(); as data) {
  <app-header [data]="data" (contactClick)="openContactModal()"></app-header>
  <main class="relative min-h-screen bg-neutral-900 text-white font-sans w-full">
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
      <div
        class="absolute top-[10%] left-[-10%] w-96 h-96 bg-purple-600/10 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute top-[40%] right-[-10%] w-96 h-96 bg-teal-500/10 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[10%] left-[20%] w-[30rem] h-[30rem] bg-indigo-500/5 rounded-full blur-[150px]"
      ></div>
    </div>

    <div class="relative z-10 w-full flex flex-col pb-24 md:pb-4">
      <div class="block w-full"><app-hero class="block" [data]="data" (contactClick)="openContactModal()"></app-hero></div>
      <div class="block w-full" appScrollReveal>
        <app-about class="block w-full" [data]="data"></app-about>
      </div>
      <div class="block w-full">
        <app-experience class="block w-full" [data]="data"></app-experience>
      </div>
      <div class="block w-full" appScrollReveal>
        <app-skills class="block w-full" [data]="data"></app-skills>
      </div>
      <div class="block w-full" appScrollReveal>
        <app-projects class="block w-full" [data]="data"></app-projects>
      </div>
      <div class="block w-full" appScrollReveal>
        <app-education class="block w-full" [data]="data"></app-education>
      </div>
      <!-- Floating 'Build Your Own Portfolio' CTA - hidden for portfolio owners -->
      @if (!isOwner()) {
        <div class="fixed bottom-6 right-1/2 translate-x-1/2 sm:translate-x-0 sm:right-6 z-50 animate-bounce hover:animate-none">
          <div class="p-[1px] rounded-full bg-gradient-to-r from-teal-400 via-purple-500 to-fuchsia-500 animate-gradient-x shadow-[0_0_16px_rgba(168,85,247,0.5),0_0_32px_rgba(45,212,191,0.25)] hover:shadow-[0_0_24px_rgba(168,85,247,0.7),0_0_48px_rgba(45,212,191,0.4)] transition-shadow duration-300">
            <a routerLink="/register" class="group flex items-center gap-2 sm:gap-3 px-4 sm:px-5 py-2.5 sm:py-3 bg-neutral-900/95 hover:bg-neutral-900 backdrop-blur-md rounded-full transition-all duration-300">
              <div class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full bg-purple-500 group-hover:bg-purple-400 shadow-[0_0_10px_rgba(168,85,247,0.8)] animate-pulse"></div>
              <span class="text-white font-bold tracking-wide text-xs sm:text-sm whitespace-nowrap">
                Build yours for free
              </span>
              <svg class="w-3 h-3 sm:w-4 sm:h-4 text-teal-400 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
          </div>
        </div>
      }
    </div>
  </main>
  <app-footer [data]="data"></app-footer>

  <app-contact-modal 
    [isOpen]="isContactModalOpen()" 
    [portfolioSlug]="currentSlug()" 
    (close)="closeContactModal()">
  </app-contact-modal>
} @else {
  <div class="flex items-center justify-center min-h-screen bg-neutral-900 text-white">
    <div class="animate-pulse flex flex-col items-center">
      <div
        class="w-12 h-12 border-4 border-t-purple-500 border-opacity-50 rounded-full animate-spin"
      ></div>
      <p class="mt-4 text-purple-400 font-mono tracking-widest">LOADING PORTFOLIO...</p>
    </div>
  </div>
}
